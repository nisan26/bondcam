<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SATVIEW.TV · שידור חי</title>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; margin:0; }
  body { background:#07090d; color:#e8eaed; font-family:Arial,Helvetica,sans-serif; display:flex; flex-direction:column; }
  header { padding:10px 16px; background:#111722; border-bottom:1px solid #2a2f3a; text-align:center; flex:0 0 auto; }
  header .t1 { font-size:15px; font-weight:bold; }
  header .t2 { font-size:12px; color:#8b949e; margin-top:2px; }
  header b { color:#58a6ff; letter-spacing:1px; }
  #wrap { flex:1 1 auto; position:relative; background:#000; min-height:0; display:flex; align-items:center; justify-content:center; padding:8px; }
  #frame { position:relative; width:100%; max-height:100%; aspect-ratio:16/9; background:#000; border:1px solid #1c2230; border-radius:8px; overflow:hidden; }
  #cv { width:100%; height:100%; display:block; background:#000; }
  #badge { position:absolute; top:8px; right:8px; background:#000b; padding:5px 11px; border-radius:8px; font-size:13px; font-weight:bold; z-index:3; }
  #badge.live { color:#3fb950; } #badge.off { color:#8b949e; }
  #res { position:absolute; top:8px; left:8px; background:#000b; padding:5px 10px; border-radius:8px; font-size:12px; z-index:3; direction:ltr; color:#3fb950; }
  #flip { position:absolute; bottom:8px; left:8px; background:#000b; color:#e8eaed; border:0; border-radius:8px; padding:8px 12px; font-size:13px; z-index:3; cursor:pointer; }
  footer { padding:12px 16px 20px; background:#0d1117; flex:0 0 auto; }
  #msg { text-align:center; font-size:13px; color:#8b949e; margin-bottom:10px; min-height:18px; }
  #msg.err { color:#f85149; } #msg.ok { color:#3fb950; }
  button.main { width:100%; border:0; border-radius:12px; padding:17px; font-size:19px; font-weight:bold; cursor:pointer; }
  #go { background:#238636; color:#fff; }
  #go:disabled { background:#21262d; color:#6e7681; }
  #stop { background:#da3633; color:#fff; display:none; }
</style>
</head>
<body>
<header>
  <div class="t1">שידור חי · <b>SATVIEW.TV</b></div>
  <div class="t2" id="camName">—</div>
</header>

<div id="wrap">
  <div id="frame">
    <canvas id="cv" width="1920" height="1080"></canvas>
    <div id="badge" class="off">○ לא משדר</div>
    <div id="res"></div>
    <button id="flip">🔄 החלף מצלמה</button>
  </div>
</div>

<footer>
  <div id="msg">לחץ "התחל שידור" ואשר מצלמה+מיקרופון. אפשר להחזיק את הטלפון רגיל — התמונה תצא אופקית.</div>
  <button class="main" id="go">🔴 התחל שידור</button>
  <button class="main" id="stop">■ עצור שידור</button>
</footer>

<script>
const params = new URLSearchParams(location.search);
const CAM  = (params.get('cam') || 'cam1').replace(/[^a-zA-Z0-9_-]/g,'');
const WHIP = 'https://' + location.hostname + ':8889/' + CAM + '/whip';
const W = 1920, H = 1080;   // always broadcast TV format

const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const msg=document.getElementById('msg'), badge=document.getElementById('badge'), resEl=document.getElementById('res');
const goBtn=document.getElementById('go'), stopBtn=document.getElementById('stop'), flipBtn=document.getElementById('flip');
document.getElementById('camName').textContent='ערוץ: '+CAM.toUpperCase();

// hidden raw camera video
const src=document.createElement('video');
src.autoplay=true; src.muted=true; src.playsInline=true; src.setAttribute('playsinline','');

let camStream=null, outStream=null, pc=null, raf=null, facing='user';  // front camera by default
const setMsg=(t,c)=>{ msg.textContent=t; msg.className=c||''; };

/* Draw the camera into a fixed 1920x1080 landscape canvas (cover-fit).
   Works whether the phone is held vertically or horizontally. */
function draw(){
  const sw=src.videoWidth, sh=src.videoHeight;
  if(sw && sh){
    const scale=Math.max(W/sw, H/sh);
    const dw=sw*scale, dh=sh*scale;
    ctx.drawImage(src, (W-dw)/2, (H-dh)/2, dw, dh);
  }
  raf=requestAnimationFrame(draw);
}

async function openCamera(){
  if(camStream) camStream.getTracks().forEach(t=>t.stop());
  camStream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode: facing, width:{ideal:1920}, height:{ideal:1080}, frameRate:{ideal:30} },
    audio:{ echoCancellation:true, noiseSuppression:true }
  });
  src.srcObject = camStream;
  await src.play().catch(()=>{});
  if(!raf) draw();
  resEl.textContent = W+'×'+H;   // output is always Full HD landscape
}

flipBtn.onclick = async () => {
  facing = (facing==='user') ? 'environment' : 'user';
  try {
    const oldAudio = camStream ? camStream.getAudioTracks()[0] : null;
    await openCamera();
    // if streaming, swap the audio sender too (video comes from canvas, unchanged)
    if(pc && camStream){
      const aSender = pc.getSenders().find(s=>s.track && s.track.kind==='audio');
      const newAudio = camStream.getAudioTracks()[0];
      if(aSender && newAudio) await aSender.replaceTrack(newAudio);
    }
  } catch(e){ setMsg('לא ניתן להחליף מצלמה: '+e.message,'err'); }
};

async function start(){
  goBtn.disabled=true;
  setMsg('מבקש גישה למצלמה ולמיקרופון...');
  try { await openCamera(); }
  catch(e){ setMsg('אין גישה למצלמה/מיקרופון: '+e.message,'err'); goBtn.disabled=false; return; }

  setMsg('מתחבר לשרת...');
  try{
    // broadcast the CANVAS (always 1920x1080 landscape) + mic audio
    outStream = cv.captureStream(30);
    camStream.getAudioTracks().forEach(t=>outStream.addTrack(t));

    pc = new RTCPeerConnection({ iceServers:[{urls:'stun:stun.l.google.com:19302'}] });
    outStream.getTracks().forEach(t=>pc.addTrack(t, outStream));

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await new Promise(res=>{
      if(pc.iceGatheringState==='complete') return res();
      const chk=()=>{ if(pc.iceGatheringState==='complete'){ pc.removeEventListener('icegatheringstatechange',chk); res(); } };
      pc.addEventListener('icegatheringstatechange',chk);
      setTimeout(res,3000);
    });

    const r = await fetch(WHIP,{ method:'POST', headers:{'Content-Type':'application/sdp'}, body:pc.localDescription.sdp });
    if(!r.ok) throw new Error('השרת החזיר '+r.status);
    await pc.setRemoteDescription({ type:'answer', sdp: await r.text() });

    badge.textContent='● בשידור'; badge.className='live';
    setMsg('אתה בשידור חי · 1920×1080 ✓','ok');
    goBtn.style.display='none'; stopBtn.style.display='block';
  }catch(e){ setMsg('שגיאת חיבור לשרת: '+e.message,'err'); stopAll(); goBtn.disabled=false; }
}

function stopAll(){
  if(pc){ try{pc.close();}catch(e){} pc=null; }
  if(outStream){ outStream.getTracks().forEach(t=>t.stop()); outStream=null; }
  if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; }
  if(raf){ cancelAnimationFrame(raf); raf=null; }
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  badge.textContent='○ לא משדר'; badge.className='off';
  resEl.textContent='';
  goBtn.style.display='block'; goBtn.disabled=false; stopBtn.style.display='none';
  setMsg('השידור נעצר.');
}

goBtn.onclick=start; stopBtn.onclick=stopAll;
window.addEventListener('beforeunload',stopAll);
</script>
</body>
</html>
