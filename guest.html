<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SATVIEW.TV · שידור חי</title>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; margin:0; }
  body { background:#07090d; color:#e8eaed; font-family:Arial,Helvetica,sans-serif; display:flex; flex-direction:column; }
  header { padding:10px 16px; background:#111722; border-bottom:1px solid #2a2f3a; text-align:center; flex:0 0 auto; }
  header .t1 { font-size:15px; font-weight:bold; }
  header .t2 { font-size:12px; color:#8b949e; margin-top:2px; }
  header b { color:#58a6ff; letter-spacing:1px; }
  #wrap { flex:1 1 auto; position:relative; background:#000; min-height:0; display:flex; align-items:center; justify-content:center; }
  /* always show a 16:9 TV frame */
  #frame { position:relative; width:100%; max-height:100%; aspect-ratio:16/9; background:#000; border:1px solid #1c2230; overflow:hidden; }
  video { width:100%; height:100%; object-fit:cover; background:#000; display:block; }
  #badge { position:absolute; top:8px; right:8px; background:#000b; padding:5px 11px; border-radius:8px; font-size:13px; font-weight:bold; z-index:3; }
  #badge.live { color:#3fb950; } #badge.off { color:#8b949e; }
  #res { position:absolute; top:8px; left:8px; background:#000b; padding:5px 10px; border-radius:8px; font-size:12px; z-index:3; direction:ltr; color:#8b949e; }
  #res.bad { color:#f0883e; }
  #rotate { position:absolute; inset:0; display:none; align-items:center; justify-content:center; background:#000d; z-index:4; text-align:center; font-size:17px; font-weight:bold; color:#f0883e; padding:20px; }
  #rotate.on { display:flex; }
  footer { padding:12px 16px 20px; background:#0d1117; flex:0 0 auto; }
  #msg { text-align:center; font-size:13px; color:#8b949e; margin-bottom:10px; min-height:18px; }
  #msg.err { color:#f85149; } #msg.ok { color:#3fb950; }
  button { width:100%; border:0; border-radius:12px; padding:17px; font-size:19px; font-weight:bold; cursor:pointer; }
  #go { background:#238636; color:#fff; }
  #go:disabled { background:#21262d; color:#6e7681; }
  #stop { background:#da3633; color:#fff; display:none; }
</style>
</head>
<body>
<header>
  <div class="t1">שידור חי · <b>SATVIEW.TV</b></div>
  <div class="t2" id="camName">—</div>
</header>

<div id="wrap">
  <div id="frame">
    <video id="v" autoplay muted playsinline></video>
    <div id="badge" class="off">○ לא משדר</div>
    <div id="res"></div>
    <div id="rotate">📱↻ סובב את הטלפון לרוחב<br><span style="font-size:14px;font-weight:normal;color:#8b949e">השידור חייב להיות אופקי (16:9)</span></div>
  </div>
</div>

<footer>
  <div id="msg">החזק את הטלפון <b>לרוחב</b>, לחץ "התחל שידור" ואשר מצלמה+מיקרופון</div>
  <button id="go">🔴 התחל שידור</button>
  <button id="stop">■ עצור שידור</button>
</footer>

<script>
const params = new URLSearchParams(location.search);
const CAM  = (params.get('cam') || 'cam1').replace(/[^a-zA-Z0-9_-]/g,'');
const WHIP = 'https://' + location.hostname + ':8889/' + CAM + '/whip';

const v=document.getElementById('v'), msg=document.getElementById('msg'), badge=document.getElementById('badge');
const resEl=document.getElementById('res'), rotEl=document.getElementById('rotate');
const goBtn=document.getElementById('go'), stopBtn=document.getElementById('stop');
document.getElementById('camName').textContent = 'ערוץ: ' + CAM.toUpperCase();

let pc=null, stream=null;
const setMsg=(t,c)=>{ msg.textContent=t; msg.className=c||''; };

function showRes(){
  if(!stream) return;
  const s = stream.getVideoTracks()[0].getSettings();
  const w=s.width||0, h=s.height||0;
  resEl.textContent = w+'×'+h;
  const portrait = h > w;
  resEl.className = (w>=1920 && h>=1080 && !portrait) ? '' : 'bad';
  rotEl.classList.toggle('on', portrait);
}

async function start(){
  goBtn.disabled=true;
  setMsg('מבקש גישה למצלמה ולמיקרופון...');
  try{
    // Force TV format: 1920x1080 landscape 16:9
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ width:{ideal:1920,min:1280}, height:{ideal:1080,min:720},
              aspectRatio:{ideal:16/9}, frameRate:{ideal:30}, facingMode:'environment' },
      audio:{ echoCancellation:true, noiseSuppression:true }
    });
    // try to lock 1080p if the device allows
    try { await stream.getVideoTracks()[0].applyConstraints({ width:1920, height:1080, aspectRatio:16/9 }); } catch(e){}
  }catch(e){ setMsg('אין גישה למצלמה/מיקרופון: '+e.message,'err'); goBtn.disabled=false; return; }

  v.srcObject = stream;
  showRes();
  window.addEventListener('orientationchange', ()=>setTimeout(showRes,400));

  setMsg('מתחבר לשרת...');
  try{
    pc = new RTCPeerConnection({ iceServers:[{urls:'stun:stun.l.google.com:19302'}] });
    stream.getTracks().forEach(t=>pc.addTrack(t,stream));
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await new Promise(res=>{
      if(pc.iceGatheringState==='complete') return res();
      const chk=()=>{ if(pc.iceGatheringState==='complete'){ pc.removeEventListener('icegatheringstatechange',chk); res(); } };
      pc.addEventListener('icegatheringstatechange',chk);
      setTimeout(res,3000);
    });
    const r = await fetch(WHIP,{ method:'POST', headers:{'Content-Type':'application/sdp'}, body:pc.localDescription.sdp });
    if(!r.ok) throw new Error('השרת החזיר '+r.status);
    await pc.setRemoteDescription({ type:'answer', sdp: await r.text() });

    badge.textContent='● בשידור'; badge.className='live';
    setMsg('אתה בשידור חי ✓','ok');
    goBtn.style.display='none'; stopBtn.style.display='block';
    setInterval(showRes, 3000);
  }catch(e){ setMsg('שגיאת חיבור לשרת: '+e.message,'err'); stop(); goBtn.disabled=false; }
}

function stop(){
  if(pc){ try{pc.close();}catch(e){} pc=null; }
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  v.srcObject=null;
  badge.textContent='○ לא משדר'; badge.className='off';
  resEl.textContent=''; rotEl.classList.remove('on');
  goBtn.style.display='block'; goBtn.disabled=false; stopBtn.style.display='none';
  setMsg('השידור נעצר.');
}
goBtn.onclick=start; stopBtn.onclick=stop;
window.addEventListener('beforeunload',stop);
</script>
</body>
</html>
