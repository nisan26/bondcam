<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>SATVIEW.TV · שידור חי</title>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; margin:0; overflow:hidden; background:#000; }
  body { font-family:Arial,Helvetica,sans-serif; color:#fff; }

  /* fullscreen mirror self-view */
  #prev { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; background:#000; z-index:0; }
  #prev.mirror { transform:scaleX(-1); }

  /* 16:9 broadcast-area guide */
  #guide { position:fixed; left:0; right:0; top:50%; transform:translateY(-50%); aspect-ratio:16/9;
           border:2px solid #3fb95088; box-shadow:0 0 0 4000px #000a; z-index:1; pointer-events:none; }
  #guideLbl { position:absolute; top:-24px; right:2px; font-size:11px; color:#3fb950; background:#000a; padding:2px 7px; border-radius:5px; }

  /* overlays */
  .top { position:fixed; top:0; left:0; right:0; padding:10px 12px; display:flex; align-items:center; gap:8px; z-index:3;
         background:linear-gradient(#000c,#0000); }
  .top .name { flex:1; font-size:13px; font-weight:bold; }
  .top .name b { color:#58a6ff; }
  .chip { background:#000b; padding:5px 10px; border-radius:8px; font-size:12px; font-weight:bold; white-space:nowrap; }
  #badge.live { color:#3fb950; } #badge.off { color:#9aa4b2; }
  #res { color:#3fb950; direction:ltr; }

  .bottom { position:fixed; bottom:0; left:0; right:0; padding:14px 14px 22px; z-index:3;
            background:linear-gradient(#0000,#000d); }
  #msg { text-align:center; font-size:12.5px; color:#c9d1d9; margin-bottom:10px; min-height:17px; text-shadow:0 1px 3px #000; }
  #msg.err { color:#ff7b72; } #msg.ok { color:#3fb950; }
  .row { display:flex; gap:8px; align-items:center; }
  button.main { flex:1; border:0; border-radius:14px; padding:17px; font-size:19px; font-weight:bold; cursor:pointer; }
  #go { background:#238636; color:#fff; }
  #go:disabled { background:#333a; color:#8b949e; }
  #stop { background:#da3633; color:#fff; display:none; }
  #flip { flex:0 0 auto; background:#ffffff26; color:#fff; border:0; border-radius:14px; padding:17px 18px; font-size:20px; cursor:pointer; }
  canvas { display:none; }
</style>
</head>
<body>
<video id="prev" autoplay muted playsinline></video>
<div id="guide"><span id="guideLbl">אזור השידור 16:9</span></div>
<canvas id="cv" width="1920" height="1080"></canvas>

<div class="top">
  <div class="name">שידור חי · <b>SATVIEW.TV</b> · <span id="camName">—</span></div>
  <span class="chip" id="res"></span>
  <span class="chip off" id="badge">○ לא משדר</span>
</div>

<div class="bottom">
  <div id="msg">לחץ "התחל שידור" ואשר מצלמה+מיקרופון</div>
  <div class="row">
    <button class="main" id="go">🔴 התחל שידור</button>
    <button class="main" id="stop">■ עצור</button>
    <button id="flip">🔄</button>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const CAM  = (params.get('cam') || 'cam1').replace(/[^a-zA-Z0-9_-]/g,'');
const WHIP = 'https://' + location.hostname + ':8889/' + CAM + '/whip';
const W=1920, H=1080;                    // broadcast format
const VIDEO_KBPS = 3500;                 // video bitrate
const AUDIO_BPS  = 160000;               // audio bitrate (160 kbps)

const prev=document.getElementById('prev'), cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const msg=document.getElementById('msg'), badge=document.getElementById('badge'), resEl=document.getElementById('res');
const goBtn=document.getElementById('go'), stopBtn=document.getElementById('stop'), flipBtn=document.getElementById('flip');
document.getElementById('camName').textContent = CAM.toUpperCase();

let camStream=null, outStream=null, pc=null, raf=null, facing='user';
const setMsg=(t,c)=>{ msg.textContent=t; msg.className=c||''; };

/* draw camera into fixed 1920x1080 landscape canvas (center-crop) -> always TV format */
function draw(){
  const sw=prev.videoWidth, sh=prev.videoHeight;
  if(sw&&sh){
    const s=Math.max(W/sw, H/sh), dw=sw*s, dh=sh*s;
    ctx.drawImage(prev, (W-dw)/2, (H-dh)/2, dw, dh);
  }
  raf=requestAnimationFrame(draw);
}

async function openCamera(){
  if(camStream) camStream.getTracks().forEach(t=>t.stop());
  camStream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:facing, width:{ideal:1920}, height:{ideal:1080}, frameRate:{ideal:30} },
    audio:{ echoCancellation:true, noiseSuppression:true, channelCount:1 }
  });
  prev.srcObject = camStream;
  prev.classList.toggle('mirror', facing==='user');   // mirror only the preview, not the broadcast
  await prev.play().catch(()=>{});
  if(!raf) draw();
  resEl.textContent = W+'×'+H;
}

/* force opus bitrate in the SDP */
function setOpusBitrate(sdp, bps){
  return sdp.replace(/a=fmtp:(\d+) ([^\r\n]*useinbandfec=1[^\r\n]*)/g,
    (m,pt,rest)=> 'a=fmtp:'+pt+' '+rest+';maxaveragebitrate='+bps+';stereo=0');
}

async function applyBitrates(){
  for(const s of pc.getSenders()){
    if(!s.track) continue;
    const p = s.getParameters();
    if(!p.encodings || !p.encodings.length) p.encodings=[{}];
    p.encodings[0].maxBitrate = (s.track.kind==='video') ? VIDEO_KBPS*1000 : AUDIO_BPS;
    try { await s.setParameters(p); } catch(e){}
  }
}

flipBtn.onclick = async () => {
  facing = (facing==='user') ? 'environment' : 'user';
  try{
    await openCamera();
    if(pc && camStream){
      const aS = pc.getSenders().find(s=>s.track && s.track.kind==='audio');
      const a  = camStream.getAudioTracks()[0];
      if(aS && a) await aS.replaceTrack(a);
      await applyBitrates();
    }
  }catch(e){ setMsg('לא ניתן להחליף מצלמה: '+e.message,'err'); }
};

async function start(){
  goBtn.disabled=true;
  setMsg('מבקש גישה למצלמה ולמיקרופון...');
  try { await openCamera(); }
  catch(e){ setMsg('אין גישה למצלמה/מיקרופון: '+e.message,'err'); goBtn.disabled=false; return; }

  setMsg('מתחבר לשרת...');
  try{
    outStream = cv.captureStream(30);                       // broadcast the 16:9 canvas
    camStream.getAudioTracks().forEach(t=>outStream.addTrack(t));

    pc = new RTCPeerConnection({ iceServers:[{urls:'stun:stun.l.google.com:19302'}] });
    outStream.getTracks().forEach(t=>pc.addTrack(t, outStream));

    const offer = await pc.createOffer();
    offer.sdp = setOpusBitrate(offer.sdp, AUDIO_BPS);
    await pc.setLocalDescription(offer);
    await applyBitrates();

    await new Promise(res=>{
      if(pc.iceGatheringState==='complete') return res();
      const chk=()=>{ if(pc.iceGatheringState==='complete'){ pc.removeEventListener('icegatheringstatechange',chk); res(); } };
      pc.addEventListener('icegatheringstatechange',chk);
      setTimeout(res,3000);
    });

    const r = await fetch(WHIP,{ method:'POST', headers:{'Content-Type':'application/sdp'}, body:pc.localDescription.sdp });
    if(!r.ok) throw new Error('השרת החזיר '+r.status);
    await pc.setRemoteDescription({ type:'answer', sdp: await r.text() });
    await applyBitrates();

    badge.textContent='● בשידור'; badge.className='chip live';
    setMsg('בשידור חי · 1920×1080 · '+VIDEO_KBPS+'k וידאו / 160k אודיו ✓','ok');
    goBtn.style.display='none'; stopBtn.style.display='block';
  }catch(e){ setMsg('שגיאת חיבור: '+e.message,'err'); stopAll(); goBtn.disabled=false; }
}

function stopAll(){
  if(pc){ try{pc.close();}catch(e){} pc=null; }
  if(outStream){ outStream.getTracks().forEach(t=>t.stop()); outStream=null; }
  if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; }
  if(raf){ cancelAnimationFrame(raf); raf=null; }
  prev.srcObject=null;
  badge.textContent='○ לא משדר'; badge.className='chip off';
  resEl.textContent='';
  goBtn.style.display='block'; goBtn.disabled=false; stopBtn.style.display='none';
  setMsg('השידור נעצר.');
}

goBtn.onclick=start; stopBtn.onclick=stopAll;
window.addEventListener('beforeunload',stopAll);
</script>
</body>
</html>
