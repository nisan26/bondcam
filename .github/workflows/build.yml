name: Build BondCam APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: unzip -o bonding-project.zip

      - name: Apply latest app sources
        run: |
          SRC=bonding-project/android/BondCam/app/src/main
          cp app/MainActivity.kt     "$SRC/java/com/satview/bondcam/MainActivity.kt"
          cp app/SrtlaSender.kt      "$SRC/java/com/satview/bondcam/srtla/SrtlaSender.kt"
          cp app/AndroidManifest.xml "$SRC/AndroidManifest.xml"
          cp app/activity_main.xml   "$SRC/res/layout/activity_main.xml"
          grep -c handleSetupLink "$SRC/java/com/satview/bondcam/MainActivity.kt"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: bonding-project/android/BondCam
        run: gradle assembleDebug --no-daemon

      - name: Rename APK
        run: cp bonding-project/android/BondCam/app/build/outputs/apk/debug/app-debug.apk bondcam.apk

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: BondCam-APK
          path: bondcam.apk

      # Publish a public, always-current download URL:
      #   https://github.com/nisan26/bondcam/releases/latest/download/bondcam.apk
      - name: Publish APK to the "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: BondCam (latest build)
          files: bondcam.apk
